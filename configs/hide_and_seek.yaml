# Hide-and-Seek Environment Configuration
# Ego is agent_0 (prey); adversary_0 switches between direct, flanking, and
# ambush strategies mid-episode. HER is disabled (no_her=True on env).

defaults:
  - _self_

# Environment settings
env:
  name: "HideAndSeek"
  max_episode_length: 50

# Model set: Define adversary_0's possible policies
model_set:
  models:
    - name: "direct"
      # Policy params: [intercept_weight, direct_weight, temperature]
      policy_params: [0.0, 2.0, 4.0]
      prior: 0.333

    - name: "flanking"
      # Policy params: [intercept_weight, direct_weight, temperature]
      policy_params: [1.5, 0.5, 4.0]
      prior: 0.334

    - name: "ambush"
      # Policy params: [intercept_weight, direct_weight, temperature]
      policy_params: [2.0, 1.0, 3.0]
      prior: 0.333

# HIM settings
him:
  window_fraction: 0.5
  warmup_episodes: 20
  threshold: -2.0
  ratio_mode: "delta"
  ratio_delta: 2.0

# HER settings (disabled via env.no_her — these params kept for schema consistency)
her:
  strategy: "future"
  k: 4

# Training hyperparameters
training:
  total_episodes: 50
  pretrain_episodes: 200
  pretrain_mode: fixed
  concurrent_training: false
  batch_size: 128
  buffer_capacity: 100000
  updates_per_episode: 40
  lr_actor: 0.0003
  lr_critic: 0.001
  gamma: 0.95
  tau: 0.005
  alpha: 0.2
  seed: 42

# Agent architecture
agent:
  type: "him_her"
  hidden_sizes: [256, 256]
  model_encoding:
    embed_dim: 64
    num_layers: 2
    use_layer_norm: true

# Logging settings
logging:
  use_wandb: false
  project: "him-her"
  log_interval_episodes: 10
  eval_interval_episodes: 50
